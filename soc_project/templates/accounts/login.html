{% extends 'base.html' %}

{% block title %}Iniciar sesión — SOC Predictor{% endblock %}

{% block public_content %}
<div class="min-h-screen flex items-center justify-center bg-slate-900 px-6">
    <div class="w-full max-w-sm">

        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-500 rounded-lg mb-4">
                <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.955 11.955 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
                </svg>
            </div>
            <h1 class="text-lg font-semibold text-white">SOC Predictor</h1>
            <p class="text-slate-500 text-sm mt-1">Sistema de análisis de amenazas ML</p>
        </div>

        <!-- Card -->
        <div class="bg-slate-800 border border-slate-700 rounded-lg p-6">
            <h2 class="text-sm font-semibold text-white mb-5">Iniciar sesión</h2>

            {% if error %}
            <div class="mb-4 bg-red-500/10 border border-red-500/20 text-red-400 rounded-md px-4 py-3 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Usuario</label>
                    <input type="text" name="username" autocomplete="username"
                        class="w-full bg-slate-700 border border-slate-600 text-slate-100 placeholder:text-slate-500 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Contraseña</label>
                    <input type="password" name="password" autocomplete="current-password"
                        class="w-full bg-slate-700 border border-slate-600 text-slate-100 placeholder:text-slate-500 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 rounded-md text-sm">
                    Entrar
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-slate-500 mt-4">
            ¿No tienes cuenta?
            <a href="{% url 'register' %}" class="text-blue-400 hover:text-blue-300 font-medium">Regístrate</a>
        </p>

    </div>
</div>
{% endblock %}
